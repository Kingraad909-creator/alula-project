<!DOCTYPE HTML>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>تواصل معنا</h1>
        <p>يسعدنا استقبال آرائكم واستفساراتكم حول مشروع العلا</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="places.html">معالم العلا</a></li>
            <li><a href="contact.html" class="active">تواصل معنا</a></li>
        </ul>
    </nav>

    <main>
        <div class="contact-container">
            <h2>إرسال رسالة</h2>
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('تم استلام رسالتك بنجاح!');">
                <div class="form-group">
                    <label for="name">الاسم الكريم:</label>
                    <input type="text" id="name" required placeholder="أدخل اسمك هنا">
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="message">نص الرسالة:</label>
                    <textarea id="message" rows="5" required placeholder="اكتب رسالتك أو استفسارك هنا..."></textarea>
                </div>
                <button type="submit" class="btn-submit">إرسال الآن</button>
            </form>
        </div>
    </main>

</body>
</html>
